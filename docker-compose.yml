services:
  server:
    build: ./server
    container_name: data-analysis-server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      LLM_DEBUG: "true"
      LLM_DEBUG_DIR: /app/data/llm-debug
    expose:
      - "8080"
    volumes:
      - ./data:/app/data
      - python-workspace:/app/python-workspace
    networks:
      - app-network
    depends_on:
      python-executor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
          pids: 256

  python-executor:
    build: ./python-executor
    container_name: data-analysis-python
    restart: unless-stopped
    env_file: ./server/.env
    volumes:
      - ./data:/app/data:ro
      - python-workspace:/app/workspace
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 1G
          pids: 128

  client:
    build: ./client
    container_name: data-analysis-client
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  python-workspace:
