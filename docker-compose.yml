services:
  server:
    build: ./server
    container_name: data-analysis-server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      - PYTHON_MCP_URL=http://python-executor:8081
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - uploads:/app/uploads
      - python-workspace:/app/python-workspace
    depends_on:
      python-executor:
        condition: service_started

  python-executor:
    build: ./python-executor
    container_name: data-analysis-python
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data:ro
      - uploads:/app/uploads:ro
      - python-workspace:/app/workspace

  client:
    build: ./client
    container_name: data-analysis-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  uploads:
  python-workspace:
