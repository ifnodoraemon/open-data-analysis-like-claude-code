name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: ./server/go.sum
      - name: Run Go tests
        working-directory: ./server
        run: go test -v ./...
      - name: Run Go vet
        working-directory: ./server
        run: go vet ./...

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      - name: Run frontend tests
        working-directory: ./client
        run: npm test
      - name: Build Vue Client
        working-directory: ./client
        run: npm run build

  test-python-executor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ./python-executor
        run: pip install -r requirements.txt requests
      - name: Run sandbox tests
        working-directory: ./python-executor
        env:
          PROXY_TOKEN: ci-test-token
        run: |
          python main.py &
          sleep 3
          python test_sandbox.py

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, test-python-executor]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Compose
        run: docker compose build
      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push server image
        if: github.ref == 'refs/heads/main'
        run: |
          IMG=ghcr.io/${{ github.repository_owner }}/data-analysis-server
          docker tag data-analysis-server:latest $IMG:${{ github.sha }}
          docker tag data-analysis-server:latest $IMG:latest
          docker push $IMG:${{ github.sha }}
          docker push $IMG:latest
      - name: Tag and push python-executor image
        if: github.ref == 'refs/heads/main'
        run: |
          IMG=ghcr.io/${{ github.repository_owner }}/data-analysis-python
          docker tag data-analysis-python-executor:latest $IMG:${{ github.sha }}
          docker tag data-analysis-python-executor:latest $IMG:latest
          docker push $IMG:${{ github.sha }}
          docker push $IMG:latest
      - name: Tag and push client image
        if: github.ref == 'refs/heads/main'
        run: |
          IMG=ghcr.io/${{ github.repository_owner }}/data-analysis-client
          docker tag data-analysis-client:latest $IMG:${{ github.sha }}
          docker tag data-analysis-client:latest $IMG:latest
          docker push $IMG:${{ github.sha }}
          docker push $IMG:latest

  scenario-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-backend, build-frontend]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Go tests
        working-directory: ./server
        run: go test -v ./...
      - name: Start services
        run: |
          cat > server/.env <<'CIEOF'
          LLM_PROVIDER=openai
          LLM_BASE_URL=https://api.openai.com
          LLM_API_ENDPOINT=https://api.openai.com/v1/responses
          LLM_API_KEY=ci-smoke-skip
          LLM_MODEL=gpt-4o
          LLM_DEBUG=true
          LLM_DEBUG_DIR=./data/llm-debug
          SERVER_PORT=8080
          PYTHON_MCP_URL=http://python-executor:8081
          PROXY_TOKEN=ci-smoke-token
          AUTH_SECRET=ci-smoke-test-auth-secret-value
          DEFAULT_USER_ID=testuser
          DEFAULT_USER_EMAIL=test@example.com
          DEFAULT_USER_NAME=SmokeTest
          DEFAULT_USER_PASSWORD=ci-smoke-test-password
          DEFAULT_WORKSPACE_ID=workspace_default
          DEFAULT_WORKSPACE_NAME=Default Workspace
          STORAGE_ROOT=./data/storage
          CACHE_ROOT=./data/cache
          METADATA_DB_PATH=./data/metadata/app.db
          TEMP_DIR=./data/tmp
          CIEOF
          docker compose up -d --build
          sleep 10
      - name: Run smoke scenarios
        env:
          SMOKE_SCENARIOS: "01_sales_complete 12_ambiguous_metrics"
          SKIP_INFRA_FAILURES: "1"
        run: bash scripts/smoke_test.sh http://127.0.0.1 120
      - name: Run eval report
        if: always()
        run: node scripts/eval_report.js --results-dir tmp/scenario-runs
      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: tmp/smoke-test-summary.json
          retention-days: 14
