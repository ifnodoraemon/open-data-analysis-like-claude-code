name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run Go tests
        working-directory: ./server
        run: go test -v ./...
      - name: Run Go vet
        working-directory: ./server
        run: go vet ./...

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      - name: Run frontend tests
        working-directory: ./client
        run: npm test
      - name: Build Vue Client
        working-directory: ./client
        run: npm run build

  test-python-executor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ./python-executor
        run: pip install -r requirements.txt requests
      - name: Run sandbox tests
        working-directory: ./python-executor
        env:
          PROXY_TOKEN: ci-test-token
        run: |
          python main.py &
          sleep 3
          python test_sandbox.py

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, test-python-executor]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Compose
        run: docker compose build

  scenario-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == "push" && github.ref == "refs/heads/main"
    needs: [test-backend, build-frontend]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Go tests
        working-directory: ./server
        run: go test -v ./...
      - name: Start services
        run: |
          cp server/.env.example server/.env
          PROXY_TOKEN=ci-smoke-token docker compose up -d --build
          sleep 10
      - name: Run smoke scenarios
        env:
          SMOKE_SCENARIOS: "01_sales_complete 12_ambiguous_metrics"
          SKIP_INFRA_FAILURES: "1"
        run: bash scripts/smoke_test.sh http://127.0.0.1 120
      - name: Run eval report
        if: always()
        run: node scripts/eval_report.js --results-dir tmp/scenario-runs
      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: tmp/smoke-test-summary.json
          retention-days: 14
