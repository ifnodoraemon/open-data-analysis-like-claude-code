name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: ./server/go.sum
      - name: Run Go tests
        working-directory: ./server
        run: go test -v ./...
      - name: Run Go vet
        working-directory: ./server
        run: go vet ./...

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      - name: Run frontend tests
        working-directory: ./client
        run: npm test
      - name: Build Vue Client
        working-directory: ./client
        run: npm run build

  test-python-executor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ./python-executor
        run: pip install -r requirements.txt requests
      - name: Run sandbox tests
        working-directory: ./python-executor
        env:
          PROXY_TOKEN: ci-test-token
        run: |
          python main.py &
          sleep 3
          python test_sandbox.py

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, test-python-executor]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build images
        run: docker compose build
      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push images to ghcr.io
        if: github.ref == 'refs/heads/main'
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for svc in server client; do
            IMG="ghcr.io/${OWNER}/data-analysis-${svc}"
            docker tag "opendataanalysis-${svc}:latest" "${IMG}:${{ github.sha }}"
            docker tag "opendataanalysis-${svc}:latest" "${IMG}:latest"
            docker push "${IMG}:${{ github.sha }}"
            docker push "${IMG}:latest"
          done
          IMG="ghcr.io/${OWNER}/data-analysis-python"
          docker tag opendataanalysis-python-executor:latest "${IMG}:${{ github.sha }}"
          docker tag opendataanalysis-python-executor:latest "${IMG}:latest"
          docker push "${IMG}:${{ github.sha }}"
          docker push "${IMG}:latest"

  scenario-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run Go tests
        working-directory: ./server
        run: go test -v ./...
      - name: Start services
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_SMOKE_MODEL: deepseek-ai/deepseek-v4-flash
        run: |
          if [ -z "$NVIDIA_API_KEY" ]; then
            echo "NVIDIA_API_KEY secret is required for scenario-smoke"
            exit 1
          fi
          mkdir -p tmp
          cat > tmp/nvidia-smoke-preflight.json <<CIEOF
          {
            "model": "${NVIDIA_SMOKE_MODEL}",
            "messages": [{"role": "user", "content": "Reply with ok."}],
            "reasoning_effort": "none",
            "max_tokens": 32,
            "stream": false
          }
          CIEOF
          set +e
          curl --fail-with-body --max-time 90 -sS \
            -H "Authorization: Bearer ${NVIDIA_API_KEY}" \
            -H "Content-Type: application/json" \
            https://integrate.api.nvidia.com/v1/chat/completions \
            -d @tmp/nvidia-smoke-preflight.json \
            -o tmp/nvidia-smoke-preflight-response.json \
            2>tmp/nvidia-smoke-preflight.stderr
          curl_code=$?
          set -e
          if [ "$curl_code" -ne 0 ]; then
            echo "NVIDIA preflight failed curl_exit=${curl_code}"
            cat tmp/nvidia-smoke-preflight.stderr
            exit "$curl_code"
          fi
          python3 -c "import json, sys; p=json.load(open('tmp/nvidia-smoke-preflight-response.json')); n=len(p.get('choices', [])); print('NVIDIA preflight model=%s choices=%s' % (p.get('model', '${NVIDIA_SMOKE_MODEL}'), n)); sys.exit(0 if n else 1)" | tee tmp/nvidia-smoke-preflight-summary.txt
          cat > server/.env <<CIEOF
          LLM_PROVIDER=openai
          LLM_BASE_URL=https://integrate.api.nvidia.com
          LLM_API_ENDPOINT=https://integrate.api.nvidia.com/v1/chat/completions
          LLM_API_KEY=${NVIDIA_API_KEY}
          LLM_MODEL=${NVIDIA_SMOKE_MODEL}
          LLM_REASONING_EFFORT=none
          LLM_MAX_TOKENS=4096
          LLM_DEBUG=true
          LLM_DEBUG_DIR=./data/llm-debug
          SERVER_PORT=8080
          PYTHON_MCP_URL=http://python-executor:8081
          PROXY_TOKEN=ci-smoke-token
          AUTH_SECRET=this-is-a-ci-smoke-test-auth-secret-val
          DEFAULT_USER_ID=testuser
          DEFAULT_USER_EMAIL=test@example.com
          DEFAULT_USER_NAME=SmokeTest
          DEFAULT_USER_PASSWORD=ci-smoke-test-password
          DEFAULT_WORKSPACE_ID=workspace_default
          DEFAULT_WORKSPACE_NAME=Default Workspace
          STORAGE_ROOT=./data/storage
          CACHE_ROOT=./data/cache
          METADATA_DB_PATH=./data/metadata/app.db
          TEMP_DIR=./data/tmp
          CIEOF
          # Ensure host-side data directories exist for bind mount with write perms
          mkdir -p data/metadata data/cache data/storage data/tmp
          chmod -R 777 data/
          # Create CI override to expose server port for smoke test
          cat > docker-compose.ci.yml <<'OVEOF'
          services:
            server:
              ports:
                - "8080:8080"
          OVEOF
          docker compose -f docker-compose.yml -f docker-compose.ci.yml build
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
          sleep 10
      - name: Run smoke scenarios
        env:
          SMOKE_SCENARIOS: "sales_complete ambiguous_metrics"
        run: bash scripts/smoke_test.sh http://127.0.0.1 240
      - name: Run eval report
        if: always()
        run: node scripts/eval_report.js --results-dir tmp/scenario-runs
      - name: Dump smoke diagnostics
        if: failure()
        run: |
          if [ -f docker-compose.ci.yml ]; then
            docker compose -f docker-compose.yml -f docker-compose.ci.yml ps || true
            docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=200 server python-executor || true
          else
            echo "docker compose was not started"
          fi
          find data/llm-debug -maxdepth 5 -type f | sort || true
          find data/llm-debug -name events.jsonl -print -exec tail -n 80 {} \; || true
      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            tmp/smoke-test-summary.json
            tmp/nvidia-smoke-preflight*.json
            tmp/nvidia-smoke-preflight*.stderr
            tmp/nvidia-smoke-preflight*.txt
            tmp/scenario-runs
            tmp/eval-report.json
            data/llm-debug
          retention-days: 14
